name: Feature
description: A new piece of user-visible functionality.
title: "[feature] "
labels: ["type:feature", "status:needs-triage"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What is this feature, in plain language?
      placeholder: One short paragraph describing the outcome.
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: User-visible behavior
      description: What will the user see and do? Where in the app?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist of concrete, testable conditions. Use Markdown checkboxes.
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - subscriptions
        - contracts
        - warranties
        - investments
        - expenses
        - utility-bills
        - iou
        - budgets
        - job-applications
        - cycle-menu
        - notifications
        - dashboard
        - invoicing
        - agents
        - mcp
        - infra
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: What this feature deliberately does NOT include.
  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to related issues, designs, or docs.
